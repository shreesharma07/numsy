# NOTE: This workflow is now integrated into main.yml
# This file is kept for reference only and should not be triggered
# To disable, we use workflow_dispatch only

name: Semantic Release (Legacy - Use main.yml)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "CONFIRM" to run manual release (not recommended)'
        required: true
        default: 'NO'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Manual Semantic Release
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRM'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@numsy.dev
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@numsy.dev
        run: npx semantic-release

      - name: Release Summary
        run: |
          echo "## ✅ Manual Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "View releases: https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY
