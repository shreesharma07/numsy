name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  # ==================== BUILD, TEST & SECURITY ====================
  build-test-security:
    name: Build, Test & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Code Quality
      - name: Run validation (lint, format, type-check, tests)
        run: pnpm run validate

      # Security Scans
      - name: Run pnpm audit
        run: pnpm run audit:check
        continue-on-error: true

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # Tests with Coverage
      - name: Run tests with coverage
        run: pnpm test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      # Build
      - name: Build package
        run: pnpm run build

      - name: Check package size
        run: |
          pnpm pack
          ls -lh *.tgz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            dist/
            *.tgz
          retention-days: 7

  # ==================== DEPENDENCY REVIEW (PR only) ====================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # ==================== RELEASE & DEPLOY (main/develop only) ====================
  release:
    name: Release & Deploy
    runs-on: ubuntu-latest
    needs: [build-test-security]
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for release
        run: pnpm run build

      - name: Semantic Release (Auto Version, Publish & Deploy)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@numsy.dev
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@numsy.dev
        run: |
          npx semantic-release 2>&1 | tee release.log || {
            if grep -q "cannot be republished until 24 hours have passed" release.log; then
              echo "⏰ NPM 24-hour cooldown - waiting period required"
              exit 0
            else
              exit 1
            fi
          }

      - name: Release Summary
        if: always()
        run: |
          if grep -q "published" release.log; then
            echo "## ✅ Release Completed!" >> $GITHUB_STEP_SUMMARY
            echo "📦 Published to NPM | 🏷️ Tagged | 📝 CHANGELOG updated" >> $GITHUB_STEP_SUMMARY
          elif grep -q "cannot be republished" release.log; then
            echo "## ⏰ NPM Cooldown Active" >> $GITHUB_STEP_SUMMARY
            echo "Wait 24 hours or bump version manually" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ℹ️ No Release" >> $GITHUB_STEP_SUMMARY
            echo "No feat/fix commits found" >> $GITHUB_STEP_SUMMARY
          fi
