name: Manual Release (Legacy)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all tests
        run: pnpm test:cov

      - name: Build package
        run: pnpm run build

      - name: Package size check
        run: |
          pnpm pack
          SIZE=$(ls -lh *.tgz | awk '{print $5}')
          echo "Package size: $SIZE"

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish to NPM
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Changes in this Release

            See [CHANGELOG.md](https://github.com/shreesharma07/numsy/blob/main/CHANGELOG.md) for details.

            ## Installation
            ```bash
            npm install numsy@${{ github.ref_name }}
            # or
            pnpm add numsy@${{ github.ref_name }}
            ```

  notify:
    name: Post-Release Notifications
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Notify on successful release
        run: |
          echo "✅ Successfully published numsy@${{ github.ref_name }} to NPM"
