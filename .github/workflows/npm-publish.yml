# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

# NOTE: This workflow is deprecated and replaced by main.yml
# NPM publishing is now handled automatically by semantic-release in main.yml
# This file is kept for reference only

name: Node.js Package (Legacy - Deprecated)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish (not recommended - use main.yml semantic-release instead)'
        required: true
        default: 'NO'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.inputs.force == 'YES'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Publish to NPM
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
